id: io.github.JeromeA.gcheckers
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: gcheckers
finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
modules:
  - name: gcheckers
    buildsystem: simple
    build-commands:
      - make install PREFIX=/app
    sources:
      - type: dir
        path: .
